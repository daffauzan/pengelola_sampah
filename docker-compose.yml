services:
  app:
    build: .
    container_name: pengelola_sampah_app
    restart: unless-stopped
    networks:
      - pengelola_sampah

  web:
    image: nginx:alpine
    container_name: pengelola_sampah_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pengelola_sampah

networks:
  pengelola_sampah:

volumes:
  dbdata: